# Stellar Vault Ops - Continuous Integration Pipeline
# Verifies both React frontend (Lint, Test, Build) and Rust/Soroban Smart Contracts (Format, Clippy, Test, Build)

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend - Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

  smart-contracts:
    name: Smart Contracts - Format, Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
          components: rustfmt, clippy

      - name: Cache Cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint contracts
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run contract tests
        run: cargo test --workspace --locked

      - name: Build token contract (WASM)
        run: cargo build -p stellar-vault-token --target wasm32v1-none --release --locked

      - name: Build vault contract (WASM)
        run: cargo build -p stellar-vault-contract --target wasm32v1-none --release --locked

      - name: Upload contract WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: soroban-contract-wasm
          path: |
            target/wasm32v1-none/release/stellar_vault_token.wasm
            target/wasm32v1-none/release/stellar_vault_contract.wasm
          if-no-files-found: error
